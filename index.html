<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main>
        <!-- Game Intro Screen -->
      <div id="game-intro">
       <!--  <<img src="./Images/rabbit img.png" alt="" class="start-img" />
        <br />-->
        <button id="start-button">Enter the game</button>
        <p id="jump-text">Don't forget to move!</p>
      </div>
        <!-- Game Container -->
      <div id="game-container">
        <div>
            <h2>Pick Up The Egg's</h2>
            <p>Egg's collect: <span id="egg-count">0</span></p>
            <p>Lives: <span id="level">3</span></p>
        </div>
        <!-- Game Screen -->
        <div id="game-screen"></div>
      </div>

        <!-- Game End Screen -->
      <div id="game-end">
        <img>
        <h2>Game Over</h2>
        <br />
        <button id="restart-button">Play Again 🐰</button>

      </div>
    </main>

    <script type="text/javascript" src="JS/obstacle.js"></script>
    <script type="text/javascript" src="JS/game.js"></script>
    <script type="text/javascript" src="JS/player.js"> </script>
    <script type="text/javascript" src="JS/script.js"></script>

  </body>
</html>
