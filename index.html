<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main>
        <!-- Game Intro Screen -->
      <div id="game-intro">
        <img src="./Images/rabbit img.png" alt="" class="start-img" />
        <br />
        <button id="start-button">Enter the game</button>
        <p>Don't forget the jump with space!</p>
      </div>
        <!-- Game Container -->
      <div id="game-container">
        <div>
            <h2>Pick Up The Egg's</h2>
            <p>Egg's collect: <span id="egg-count">0</span></p>
            <p>Level: <span id="level">1</span></p>
        </div>

      </div>
        <!-- Game End Screen -->
      <div id="game-end">
        <img>
        <h2>Game Over</h2>
        <br />
        <button id="restart-button">Play Again 🐰</button>

      </div>
    </main>

    <script src="./index.js"></script>
  </body>
</html>
